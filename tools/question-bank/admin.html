<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>題庫管理（老師後台）</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#fff;font-family:'Noto Sans TC',system-ui,sans-serif;padding:1.25rem}
    h1{font-size:1.35rem;color:#34d399;margin-bottom:.2rem}
    .sub{font-size:.8rem;color:#666;margin-bottom:1.5rem}

    .layout{display:grid;grid-template-columns:420px 1fr;gap:1.25rem;align-items:start}
    @media(max-width:860px){.layout{grid-template-columns:1fr}}

    .panel{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:1.25rem}
    .panel h2{font-size:.95rem;color:#34d399;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #21262d}

    label{display:block;font-size:.83rem;color:#aaa;margin:.75rem 0 .28rem}
    input,select,textarea{width:100%;background:#0d1117;border:1px solid #30363d;
      border-radius:6px;color:#e6edf3;font-size:.9rem;padding:.5rem .7rem;outline:none;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{border-color:#34d399}
    textarea{resize:vertical;min-height:70px}

    .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.3rem}
    .opt-row{display:flex;gap:.4rem;align-items:center}
    .opt-row input[type=text]{flex:1}
    .opt-row input[type=radio]{accent-color:#34d399;width:16px;height:16px;flex-shrink:0}

    .tags-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin:.4rem 0}
    .tag-chip{padding:.25rem .65rem;background:#1c2128;border:1px solid #30363d;border-radius:5px;
              font-size:.75rem;color:#aaa;cursor:pointer;transition:all .15s;user-select:none}
    .tag-chip.sel{background:#0d3d2a;border-color:#34d399;color:#34d399}

    .add-btn{margin-top:1.1rem;width:100%;padding:.7rem;background:#34d399;color:#0d1117;
             border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
    .add-btn:hover{background:#2dd4bf}
    .add-btn:disabled{opacity:.45;cursor:not-allowed}
    .msg{font-size:.8rem;margin-top:.5rem;display:none;padding:.4rem .7rem;border-radius:6px}
    .msg.ok{background:#0d3d2a;color:#34d399;display:block}
    .msg.err{background:#3d0d0d;color:#f87171;display:block}

    /* Question list */
    .qlist{display:flex;flex-direction:column;gap:.6rem;max-height:80vh;overflow-y:auto}
    .qcard{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:.85rem 1rem}
    .qcard .qtitle{font-size:.92rem;color:#e6edf3;margin-bottom:.35rem}
    .qcard .qmeta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.45rem}
    .qcard .diff-tag{font-size:.7rem;padding:.1rem .45rem;border-radius:4px}
    .diff-easy{background:#0d3d2a;color:#34d399}
    .diff-mid {background:#2d2a0a;color:#fbbf24}
    .diff-hard{background:#3d0d0d;color:#f87171}
    .tag-label{font-size:.7rem;padding:.1rem .45rem;background:#1c2128;border:1px solid #30363d;
               color:#8b949e;border-radius:4px}
    .qopts{font-size:.78rem;color:#8b949e;display:grid;grid-template-columns:1fr 1fr;gap:.2rem}
    .qopts span.correct{color:#34d399}
    .del-btn{float:right;background:transparent;border:1px solid #3d0d0d;color:#f87171;
             border-radius:5px;padding:.2rem .6rem;font-size:.75rem;cursor:pointer;margin-top:.3rem}
    .del-btn:hover{background:#3d0d0d}
    .filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem}
    .fc{padding:.3rem .7rem;border:1px solid #30363d;border-radius:99px;background:transparent;
        color:#8b949e;font-size:.75rem;cursor:pointer;transition:all .15s}
    .fc:hover,.fc.active{border-color:#34d399;color:#34d399}
    .fc.active{background:#0d3d2a}
    .empty{color:#555;text-align:center;padding:2.5rem;font-size:.9rem}
  </style>
</head>
<body>
<h1>📚 校本課程題庫管理</h1>
<p class="sub">老師後台 — 新增、管理題目，標籤化分類方便出卷</p>

<div class="layout">
  <!-- 新增題目表單 -->
  <div class="panel">
    <h2>➕ 新增題目</h2>

    <label>難度</label>
    <select id="diff">
      <option value="基礎">基礎</option>
      <option value="進階" selected>進階</option>
      <option value="挑戰">挑戰</option>
    </select>

    <label>標籤（可多選）</label>
    <div class="tags-wrap" id="tag-opts">
      <div class="tag-chip" data-tag="修辭">修辭</div>
      <div class="tag-chip" data-tag="國學常識">國學常識</div>
      <div class="tag-chip" data-tag="文學流派">文學流派</div>
      <div class="tag-chip" data-tag="字義">字義</div>
      <div class="tag-chip" data-tag="句意">句意</div>
      <div class="tag-chip" data-tag="作者背景">作者背景</div>
      <div class="tag-chip" data-tag="文言文">文言文</div>
      <div class="tag-chip" data-tag="白話文">白話文</div>
      <div class="tag-chip" data-tag="古詩詞">古詩詞</div>
      <div class="tag-chip" data-tag="現代詩">現代詩</div>
    </div>

    <label>來源（選填）</label>
    <input type="text" id="source" placeholder="例：113學測、模考第三回">

    <label>題目內容</label>
    <textarea id="qcontent" placeholder="輸入題幹…"></textarea>

    <label>選項（點選正確答案的圓圈）</label>
    <div class="opts-grid" id="opts-area">
      <div class="opt-row"><input type="radio" name="ans" value="0"><input type="text" id="o0" placeholder="選項 A"></div>
      <div class="opt-row"><input type="radio" name="ans" value="1"><input type="text" id="o1" placeholder="選項 B"></div>
      <div class="opt-row"><input type="radio" name="ans" value="2"><input type="text" id="o2" placeholder="選項 C"></div>
      <div class="opt-row"><input type="radio" name="ans" value="3"><input type="text" id="o3" placeholder="選項 D"></div>
    </div>

    <label>解析（選填）</label>
    <input type="text" id="explain" placeholder="為什麼正確答案是這個？">

    <div class="msg" id="msg"></div>
    <button class="add-btn" id="add-btn" onclick="addQ()">新增到題庫</button>
  </div>

  <!-- 題庫清單 -->
  <div class="panel">
    <h2>📋 題庫清單 <span id="count" style="color:#666;font-size:.8rem;font-weight:400"></span></h2>
    <div class="filter-row" id="filter-row">
      <div class="fc active" onclick="setTag('全部',this)">全部</div>
      <div class="fc" onclick="setTag('修辭',this)">修辭</div>
      <div class="fc" onclick="setTag('國學常識',this)">國學常識</div>
      <div class="fc" onclick="setTag('文學流派',this)">文學流派</div>
      <div class="fc" onclick="setTag('字義',this)">字義</div>
      <div class="fc" onclick="setTag('古詩詞',this)">古詩詞</div>
      <div class="fc" onclick="setTag('現代詩',this)">現代詩</div>
      <div class="fc" onclick="setTag('基礎',this)">🟢 基礎</div>
      <div class="fc" onclick="setTag('進階',this)">🟡 進階</div>
      <div class="fc" onclick="setTag('挑戰',this)">🔴 挑戰</div>
    </div>
    <div class="qlist" id="qlist"></div>
  </div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,serverTimestamp}
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBMTe5eLI3GKmLz6beXvfnaBgQaXJsr-xM",
  authDomain:"my-teaching-tools-b8e86.firebaseapp.com",
  projectId:"my-teaching-tools-b8e86",
  storageBucket:"my-teaching-tools-b8e86.firebasestorage.app",
  messagingSenderId:"47224328529",
  appId:"1:47224328529:web:6e6f761ff6b455f9db0370"
}));

// Tag chips
let selTags=new Set();
document.querySelectorAll('.tag-chip').forEach(c=>{
  c.addEventListener('click',()=>{
    if(selTags.has(c.dataset.tag)){selTags.delete(c.dataset.tag);c.classList.remove('sel');}
    else{selTags.add(c.dataset.tag);c.classList.add('sel');}
  });
});

function showMsg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+(ok?'ok':'err');}

window.addQ=async()=>{
  const btn=document.getElementById('add-btn');
  const content=document.getElementById('qcontent').value.trim();
  const opts=['o0','o1','o2','o3'].map(id=>document.getElementById(id).value.trim());
  const ans=document.querySelector('input[name=ans]:checked');
  if(!content)            return showMsg('請填寫題目內容','err');
  if(opts.some(o=>!o))   return showMsg('四個選項都必須填寫','err');
  if(!ans)               return showMsg('請點選正確答案','err');
  if(!selTags.size)      return showMsg('請至少選一個標籤','err');
  btn.disabled=true;
  try{
    await addDoc(collection(db,'questions'),{
      content, options:opts, answer:+ans.value,
      tags:[...selTags], difficulty:document.getElementById('diff').value,
      source:document.getElementById('source').value.trim()||'',
      explain:document.getElementById('explain').value.trim()||'',
      created_at:serverTimestamp()
    });
    showMsg('✅ 已加入題庫！','ok');
    document.getElementById('qcontent').value='';
    ['o0','o1','o2','o3'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('explain').value='';
    document.querySelectorAll('input[name=ans]').forEach(r=>r.checked=false);
    selTags=new Set();
    document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('sel'));
  }catch(e){showMsg('新增失敗：'+e.message,'err');}
  btn.disabled=false;
};

let all=[], tagFilter='全部';

window.setTag=(t,el)=>{
  tagFilter=t; document.querySelectorAll('.fc').forEach(c=>c.classList.remove('active')); el.classList.add('active'); render();
};

window.delQ=async(id)=>{
  if(!confirm('確定刪除這道題目？')) return;
  await deleteDoc(doc(db,'questions',id));
};

const diffClass={基礎:'diff-easy',進階:'diff-mid',挑戰:'diff-hard'};

function render(){
  const filtered = tagFilter==='全部' ? all
    : all.filter(d=>(d.tags||[]).includes(tagFilter)||(d.difficulty===tagFilter));
  document.getElementById('count').textContent=`共 ${all.length} 題，顯示 ${filtered.length} 題`;
  const el=document.getElementById('qlist');
  if(!filtered.length){el.innerHTML='<div class="empty">尚無題目</div>';return;}
  el.innerHTML=filtered.map(d=>`
    <div class="qcard">
      <button class="del-btn" onclick="delQ('${d._id}')">刪除</button>
      <div class="qtitle">${esc(d.content)}</div>
      <div class="qmeta">
        <span class="diff-tag ${diffClass[d.difficulty]||'diff-mid'}">${esc(d.difficulty)}</span>
        ${(d.tags||[]).map(t=>`<span class="tag-label">${esc(t)}</span>`).join('')}
        ${d.source?`<span class="tag-label">📌${esc(d.source)}</span>`:''}
      </div>
      <div class="qopts">${(d.options||[]).map((o,i)=>
        `<span class="${i===d.answer?'correct':''}">${'ABCD'[i]}. ${esc(o)}</span>`).join('')}</div>
      ${d.explain?`<div style="font-size:.75rem;color:#666;margin-top:.35rem">💡 ${esc(d.explain)}</div>`:''}
    </div>`).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

onSnapshot(query(collection(db,'questions'),orderBy('created_at','desc')),snap=>{
  all=snap.docs.map(d=>({_id:d.id,...d.data()}));
  render();
});
</script>
</body>
</html>
