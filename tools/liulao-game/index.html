<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>劉姥姥逛大觀園 · 課文闖關</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');

    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08080f;
      --card:#10101e;
      --card2:#161628;
      --border:#252540;
      --gold:#f5c842;
      --gold2:#e8a820;
      --red:#e84545;
      --green:#2ecc71;
      --blue:#4a9eff;
      --purple:#9b6dff;
      --text:#f0ede6;
      --muted:#7a7a9a;
    }

    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Noto Sans TC',system-ui,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── 背景紋理 ── */
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(155,109,255,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(245,200,66,.05) 0%, transparent 60%);
      pointer-events:none;z-index:0;
    }

    /* ══════════════════════════════
       HUB
    ══════════════════════════════ */
    #hub{
      position:relative;z-index:1;
      max-width:560px;margin:0 auto;
      padding:2rem 1rem 3rem;
    }

    /* 標題區 */
    .hub-hero{text-align:center;margin-bottom:2rem}
    .hub-badge{
      display:inline-block;
      font-size:.72rem;letter-spacing:.18em;
      color:var(--gold);border:1px solid rgba(245,200,66,.3);
      border-radius:99px;padding:.3rem .9rem;margin-bottom:1rem;
      background:rgba(245,200,66,.07);
    }
    .hub-hero h1{
      font-family:'Noto Serif TC',serif;
      font-size:2rem;font-weight:900;
      line-height:1.25;
      background:linear-gradient(135deg,#f5c842 0%,#fff6d6 50%,#e8a820 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:.5rem;
    }
    .hub-hero p{font-size:.85rem;color:var(--muted)}

    /* 登入卡 */
    .login-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1.25rem 1.5rem;
      margin-bottom:1.5rem;
    }
    .login-card .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .login-card label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.35rem}
    .login-card select,
    .login-card input{
      width:100%;
      background:#0a0a18;
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-size:.95rem;
      padding:.6rem .85rem;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .login-card select:focus,
    .login-card input:focus{
      border-color:rgba(245,200,66,.5);
      box-shadow:0 0 0 3px rgba(245,200,66,.08);
    }
    .login-err{color:var(--red);font-size:.8rem;margin-top:.55rem;display:none}

    /* 模式卡片 */
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
    .mode-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1.4rem 1.1rem 1.2rem;
      text-align:center;
      cursor:pointer;
      transition:transform .2s,box-shadow .25s,border-color .2s;
      position:relative;overflow:hidden;
    }
    .mode-card::before{
      content:'';position:absolute;inset:0;
      opacity:0;transition:opacity .25s;
    }
    .mode-card:hover{transform:translateY(-4px)}
    .mode-card:hover::before{opacity:1}

    .mc-gold::before{background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,.12),transparent 70%)}
    .mc-purple::before{background:radial-gradient(ellipse at 50% 0%,rgba(155,109,255,.12),transparent 70%)}
    .mc-green::before{background:radial-gradient(ellipse at 50% 0%,rgba(46,204,113,.12),transparent 70%)}
    .mc-blue::before{background:radial-gradient(ellipse at 50% 0%,rgba(74,158,255,.12),transparent 70%)}

    .mode-card:hover.mc-gold{border-color:rgba(245,200,66,.4);box-shadow:0 8px 32px rgba(245,200,66,.1)}
    .mode-card:hover.mc-purple{border-color:rgba(155,109,255,.4);box-shadow:0 8px 32px rgba(155,109,255,.1)}
    .mode-card:hover.mc-green{border-color:rgba(46,204,113,.4);box-shadow:0 8px 32px rgba(46,204,113,.1)}
    .mode-card:hover.mc-blue{border-color:rgba(74,158,255,.4);box-shadow:0 8px 32px rgba(74,158,255,.1)}

    .mode-icon{font-size:2.4rem;margin-bottom:.65rem;display:block}
    .mode-card h3{font-size:.95rem;font-weight:700;margin-bottom:.35rem}
    .mode-card p{font-size:.72rem;color:var(--muted);line-height:1.55}
    .mc-gold h3{color:var(--gold)}
    .mc-purple h3{color:var(--purple)}
    .mc-green h3{color:var(--green)}
    .mc-blue h3{color:var(--blue)}
    .mode-num{
      position:absolute;top:.7rem;right:.8rem;
      font-size:.65rem;color:var(--muted);
      background:rgba(255,255,255,.04);
      border-radius:4px;padding:.15rem .4rem;
    }

    /* ══════════════════════════════
       GAME SHELL
    ══════════════════════════════ */
    #game{
      display:none;
      position:relative;z-index:1;
      max-width:640px;margin:0 auto;
      padding:1rem;
    }
    .g-topbar{
      display:flex;align-items:center;gap:.75rem;
      margin-bottom:1.25rem;
    }
    .g-back{
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      color:var(--muted);
      border-radius:10px;padding:.45rem .85rem;
      font-size:.82rem;cursor:pointer;
      transition:all .15s;white-space:nowrap;
      flex-shrink:0;
    }
    .g-back:hover{background:rgba(255,255,255,.09);color:var(--text)}
    .g-info{flex:1;min-width:0}
    .g-title{font-size:.95rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .g-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem}

    /* ══════════════════════════════
       SHARED COMPONENTS
    ══════════════════════════════ */
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:1.4rem 1.5rem;
    }
    @media(max-width:480px){.panel{padding:1.1rem 1rem}}

    /* 進度條 */
    .prog-wrap{height:4px;background:#1a1a30;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
    .prog-bar{height:4px;border-radius:2px;transition:width .4s ease;background:linear-gradient(90deg,var(--gold2),var(--gold))}

    /* HUD 數值列 */
    .hud{display:flex;gap:.6rem;margin-bottom:1.25rem}
    .hud-box{
      flex:1;text-align:center;
      background:#0a0a18;border:1px solid var(--border);
      border-radius:10px;padding:.5rem .5rem .45rem;
    }
    .hud-label{font-size:.64rem;color:var(--muted);letter-spacing:.05em;margin-bottom:.15rem}
    .hud-val{font-size:1.15rem;font-weight:700}
    .hv-gold{color:var(--gold)}
    .hv-red{color:var(--red)}
    .hv-green{color:var(--green)}

    /* 計時器環 */
    .timer-ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
    .timer-ring-wrap svg{transform:rotate(-90deg)}
    .timer-track{fill:none;stroke:#1a1a30;stroke-width:4}
    .timer-fill{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;
                stroke-dasharray:138;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s}
    .timer-fill.danger{stroke:var(--red);animation:pulse-red .4s ease infinite alternate}
    @keyframes pulse-red{from{stroke-opacity:1}to{stroke-opacity:.4}}
    .timer-num{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:.95rem;font-weight:700;color:var(--gold);
    }
    .timer-num.danger{color:var(--red)}

    /* 題目文字 */
    .q-text{
      font-size:1rem;line-height:1.8;color:var(--text);
      background:#0a0a18;border:1px solid var(--border);
      border-radius:12px;padding:1rem 1.1rem;
      margin-bottom:1rem;
    }
    .q-hint{font-size:.78rem;color:var(--muted);margin-bottom:.5rem}

    /* 選項按鈕 */
    .opts{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
    @media(max-width:360px){.opts{grid-template-columns:1fr}}
    .opt{
      display:flex;align-items:flex-start;gap:.5rem;
      background:#0a0a18;
      border:1.5px solid var(--border);
      border-radius:12px;
      padding:.75rem .85rem;
      font-size:.88rem;color:var(--muted);
      cursor:pointer;transition:all .15s;
      text-align:left;line-height:1.5;
    }
    .opt-letter{
      flex-shrink:0;width:22px;height:22px;
      border-radius:6px;border:1.5px solid currentColor;
      display:flex;align-items:center;justify-content:center;
      font-size:.72rem;font-weight:700;margin-top:.05rem;
    }
    .opt:hover:not(.locked){border-color:rgba(245,200,66,.5);color:var(--text);background:#12121f}
    .opt.correct{border-color:var(--green);background:rgba(46,204,113,.1);color:#6ee7b7}
    .opt.correct .opt-letter{border-color:var(--green);background:var(--green);color:#000}
    .opt.wrong{border-color:var(--red);background:rgba(232,69,69,.1);color:#fca5a5}
    .opt.wrong .opt-letter{border-color:var(--red);background:var(--red);color:#fff}
    .opt.locked{cursor:default}

    /* 解析框 */
    .explain-box{
      margin-top:.85rem;border-radius:10px;
      padding:.8rem 1rem;font-size:.83rem;line-height:1.6;
      display:none;animation:fadeUp .25s ease;
    }
    .explain-ok {background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#6ee7b7}
    .explain-bad{background:rgba(232,69,69,.1);border:1px solid rgba(232,69,69,.25);color:#fca5a5}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* 下一題按鈕 */
    .next-btn{
      display:none;margin-top:.9rem;width:100%;
      padding:.8rem;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      color:#1a0e00;border:none;border-radius:12px;
      font-size:.95rem;font-weight:700;cursor:pointer;
      transition:filter .2s,transform .1s;
    }
    .next-btn:hover{filter:brightness(1.1)}
    .next-btn:active{transform:scale(.98)}

    /* ══════════════════════════════
       MODE 2 填空
    ══════════════════════════════ */
    .blank-q-num{font-size:.78rem;color:var(--muted);margin-bottom:.75rem}
    .blank-sentence{
      font-family:'Noto Serif TC',serif;
      font-size:1.05rem;line-height:2.2;color:var(--text);
      background:#0a0a18;border:1px solid var(--border);
      border-radius:12px;padding:1rem 1.1rem;
      margin-bottom:1rem;
    }
    .blank{
      display:inline-block;
      min-width:64px;padding:0 .4rem;
      border-bottom:2px solid var(--purple);
      color:var(--purple);font-weight:700;
      text-align:center;cursor:pointer;
      border-radius:4px 4px 0 0;
      transition:background .15s;
    }
    .blank:hover{background:rgba(155,109,255,.1)}
    .blank.filled{border-color:var(--green);color:var(--green)}
    .blank.wrong-fill{border-color:var(--red);color:var(--red);animation:shake .3s ease}

    .word-pool{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1rem}
    .word-chip{
      padding:.4rem .9rem;
      background:rgba(155,109,255,.1);
      border:1px solid rgba(155,109,255,.35);
      border-radius:8px;font-size:.88rem;color:var(--purple);
      cursor:pointer;transition:all .15s;user-select:none;
    }
    .word-chip:hover{background:rgba(155,109,255,.2)}
    .word-chip.selected{background:rgba(155,109,255,.25);border-color:var(--purple);outline:2px solid var(--purple)}
    .word-chip.used{opacity:.25;pointer-events:none}

    .check-btn{
      padding:.7rem 1.4rem;
      background:linear-gradient(135deg,#7c3aed,var(--purple));
      color:#fff;border:none;border-radius:10px;
      font-size:.9rem;font-weight:700;cursor:pointer;transition:filter .2s;
    }
    .check-btn:hover{filter:brightness(1.1)}
    .reset-btn{
      padding:.7rem 1.1rem;background:transparent;
      border:1px solid var(--border);color:var(--muted);
      border-radius:10px;font-size:.9rem;cursor:pointer;margin-left:.5rem;
      transition:all .15s;
    }
    .reset-btn:hover{border-color:#aaa;color:var(--text)}
    .blank-msg{margin-top:.75rem;border-radius:10px;padding:.7rem 1rem;
               font-size:.83rem;line-height:1.5;display:none;animation:fadeUp .2s ease}

    /* ══════════════════════════════
       MODE 3 配對
    ══════════════════════════════ */
    .match-intro{font-size:.83rem;color:var(--muted);margin-bottom:1rem;line-height:1.5}
    .match-cols{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .match-col h4{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-align:center;margin-bottom:.5rem}
    .match-col{display:flex;flex-direction:column;gap:.45rem}
    .match-item{
      background:#0a0a18;border:1.5px solid var(--border);border-radius:10px;
      padding:.65rem .8rem;font-size:.83rem;color:var(--muted);
      cursor:pointer;transition:all .15s;line-height:1.5;text-align:center;
    }
    .match-item:hover:not(.matched){border-color:rgba(46,204,113,.4);color:var(--text)}
    .match-item.selected{border-color:var(--gold);background:rgba(245,200,66,.08);color:var(--gold)}
    .match-item.matched{border-color:var(--green);background:rgba(46,204,113,.08);color:#6ee7b7;cursor:default}
    .match-item.wrong-m{border-color:var(--red);background:rgba(232,69,69,.08);animation:shake .35s ease}
    .match-msg{margin-top:.85rem;border-radius:10px;padding:.7rem 1rem;
               font-size:.83rem;display:none;animation:fadeUp .2s ease}

    /* ══════════════════════════════
       MODE 4 排序
    ══════════════════════════════ */
    .sort-intro{font-size:.83rem;color:var(--muted);margin-bottom:.9rem;line-height:1.5}
    .sort-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
    .sort-item{
      background:#0a0a18;border:1.5px solid var(--border);border-radius:10px;
      padding:.7rem .9rem;font-size:.88rem;color:var(--text);
      cursor:grab;display:flex;align-items:center;gap:.65rem;
      transition:all .2s;user-select:none;line-height:1.5;
    }
    .sort-item:active{cursor:grabbing;transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .sort-item.drag-over{border-color:var(--blue);background:rgba(74,158,255,.06)}
    .sort-item.correct-pos{border-color:var(--green);background:rgba(46,204,113,.08);color:#6ee7b7}
    .sort-item.wrong-pos{border-color:var(--red);background:rgba(232,69,69,.08);color:#fca5a5}
    .sort-handle{color:#333;font-size:.9rem;flex-shrink:0}
    .sort-num{
      flex-shrink:0;min-width:24px;height:24px;
      background:#1a1a30;border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;color:var(--muted);font-weight:700;
    }
    .sort-btns{display:flex;gap:.5rem;flex-wrap:wrap}
    .sort-check{
      padding:.7rem 1.4rem;background:linear-gradient(135deg,#1a6bb5,var(--blue));
      color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;
      transition:filter .2s;
    }
    .sort-check:hover{filter:brightness(1.1)}
    .sort-reset{
      padding:.7rem 1.1rem;background:transparent;border:1px solid var(--border);
      color:var(--muted);border-radius:10px;font-size:.9rem;cursor:pointer;transition:all .15s;
    }
    .sort-reset:hover{border-color:#aaa;color:var(--text)}
    .sort-msg{margin-top:.75rem;border-radius:10px;padding:.8rem 1rem;
              font-size:.83rem;line-height:1.6;display:none;animation:fadeUp .2s ease}

    /* ══════════════════════════════
       RESULT
    ══════════════════════════════ */
    #result{
      display:none;position:relative;z-index:1;
      max-width:480px;margin:0 auto;
      padding:2.5rem 1rem;text-align:center;
    }
    .result-trophy{font-size:5rem;margin-bottom:.75rem;animation:bounceIn .5s ease}
    @keyframes bounceIn{
      0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}
    }
    .result-label{font-size:.75rem;letter-spacing:.15em;color:var(--muted);margin-bottom:.4rem}
    .result-h{
      font-family:'Noto Serif TC',serif;
      font-size:1.6rem;font-weight:900;color:var(--gold);margin-bottom:.25rem;
    }
    .result-score{
      font-size:3.2rem;font-weight:900;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin:.3rem 0 .6rem;line-height:1;
    }
    .result-detail{font-size:.85rem;color:var(--muted);margin-bottom:2rem}
    .result-bars{
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:1.25rem 1.5rem;margin-bottom:1.75rem;text-align:left;
    }
    .result-bars h4{font-size:.78rem;color:var(--muted);letter-spacing:.1em;margin-bottom:1rem}
    .rb-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.7rem;font-size:.82rem}
    .rb-row:last-child{margin:0}
    .rb-label{width:72px;color:var(--muted);flex-shrink:0;font-size:.78rem}
    .rb-wrap{flex:1;height:8px;background:#1a1a30;border-radius:4px;overflow:hidden}
    .rb-bar{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .8s ease}
    .rb-val{width:34px;text-align:right;color:var(--text);font-weight:700}
    .play-again{
      padding:.85rem 2.5rem;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      color:#1a0e00;border:none;border-radius:12px;
      font-size:1rem;font-weight:700;cursor:pointer;
      transition:filter .2s,transform .1s;
    }
    .play-again:hover{filter:brightness(1.08)}
    .play-again:active{transform:scale(.97)}

    /* ══════════════════════════════
       UTILITIES
    ══════════════════════════════ */
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-5px)}
      60%{transform:translateX(5px)}
    }
    .pop{animation:pop .25s ease}
    @keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>

<!-- ════════════ HUB ════════════ -->
<div id="hub">
  <div class="hub-hero">
    <div class="hub-badge">RED CHAMBER · COURSE GAME</div>
    <h1>劉姥姥逛大觀園</h1>
    <p>四種關卡全過，征服課文！</p>
  </div>

  <div class="login-card">
    <div class="row">
      <div>
        <label>班級</label>
        <select id="hub-cls">
          <option value="">── 選擇班級 ──</option>
          <optgroup label="高一"><option>高一甲</option><option>高一乙</option><option>高一丙</option><option>高一丁</option><option>高一戊</option></optgroup>
          <optgroup label="高二"><option>高二甲</option><option>高二乙</option><option>高二丙</option><option>高二丁</option><option>高二戊</option></optgroup>
          <optgroup label="高三"><option>高三甲</option><option>高三乙</option><option>高三丙</option><option>高三丁</option><option>高三戊</option></optgroup>
        </select>
      </div>
      <div>
        <label>座號</label>
        <input type="number" id="hub-seat" placeholder="數字" min="1" max="50">
      </div>
    </div>
    <div class="login-err" id="hub-err"></div>
  </div>

  <div class="mode-grid">
    <div class="mode-card mc-gold" onclick="startMode(1)">
      <span class="mode-num">10 題</span>
      <span class="mode-icon">🎯</span>
      <h3>選擇題闖關</h3>
      <p>計時搶答<br>越快答分越高</p>
    </div>
    <div class="mode-card mc-purple" onclick="startMode(2)">
      <span class="mode-num">5 句</span>
      <span class="mode-icon">✏️</span>
      <h3>名句填空</h3>
      <p>課文名句挖空<br>點選字詞填入</p>
    </div>
    <div class="mode-card mc-green" onclick="startMode(3)">
      <span class="mode-num">5 組</span>
      <span class="mode-icon">🧩</span>
      <h3>人物配對</h3>
      <p>笑場反應<br>配對正確人物</p>
    </div>
    <div class="mode-card mc-blue" onclick="startMode(4)">
      <span class="mode-num">8 事件</span>
      <span class="mode-icon">📜</span>

// ════════════════════════════════════════════
//  MODE 1 選擇題
// ════════════════════════════════════════════
function initMCQ(){
  document.getElementById('g-title').textContent='🎯 選擇題闖關';
  const qs=[...MCQ].sort(()=>Math.random()-.5);
  let qi=0,score=0,correct=0;
  renderQ();

  function renderQ(){
    document.getElementById('g-sub').textContent=`第 ${qi+1} / ${qs.length} 題`;
    const q=qs[qi]; let t=25;
    const pct=qi/qs.length*100;
    document.getElementById('g-body').innerHTML=`
      <div class="panel pop">
        <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:${pct}%"></div></div>
        <div class="hud">
          <div class="hud-box"><div class="hud-label">得分</div><div class="hud-val hv-gold" id="m1s">${score}</div></div>
          <div class="timer-ring-wrap">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle class="timer-track" cx="26" cy="26" r="22"/>
              <circle class="timer-fill" id="tring" cx="26" cy="26" r="22"/>
            </svg>
            <div class="timer-num" id="tnum">${t}</div>
          </div>
          <div class="hud-box"><div class="hud-label">答對</div><div class="hud-val hv-green" id="m1c">${correct}</div></div>
        </div>
        <div class="q-text">${esc(q.q)}</div>
        <div class="opts">
          ${q.opts.map((o,i)=>`
            <div class="opt" onclick="m1pick(this,${i})">
              <span class="opt-letter">${'ＡＢＣＤ'[i]}</span>
              <span>${esc(o)}</span>
            </div>`).join('')}
        </div>
        <div class="explain-box" id="m1exp"></div>
        <button class="next-btn" id="m1nx" onclick="m1next()">
          ${qi+1<qs.length?'下一題 →':'查看結果 →'}
        </button>
      </div>`;
    startTimer();

    function startTimer(){
      clearInterval(window._tick); t=25;
      const ring=document.getElementById('tring');
      const num=document.getElementById('tnum');
      window._tick=setInterval(()=>{
        t--;
        if(!num||!ring){clearInterval(window._tick);return}
        num.textContent=t;
        ring.style.strokeDashoffset=(1-t/25)*138;
        if(t<=5){ring.classList.add('danger');num.classList.add('danger')}
        if(t<=0){clearInterval(window._tick);autoFail();}
      },1000);
    }
    function autoFail(){
      document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
      document.querySelectorAll('.opt')[q.ans].classList.add('correct');
      const exp=document.getElementById('m1exp');
      exp.className='explain-box explain-bad';exp.style.display='block';
      exp.textContent=`⏰ 時間到！正確答案：${q.opts[q.ans]}`;
      document.getElementById('m1nx').style.display='block';
    }
    window.m1pick=(el,idx)=>{
      clearInterval(window._tick);
      document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
      const exp=document.getElementById('m1exp');
      if(idx===q.ans){
        el.classList.add('correct');
        const pts=Math.max(10,t*10); score+=pts; correct++;
        document.getElementById('m1s').textContent=score;
        document.getElementById('m1c').textContent=correct;
        exp.className='explain-box explain-ok';exp.style.display='block';
        exp.innerHTML=`✅ 答對！+${pts} 分 &nbsp;｜&nbsp; ${esc(q.exp)}`;
      } else {
        el.classList.add('wrong');
        document.querySelectorAll('.opt')[q.ans].classList.add('correct');
        exp.className='explain-box explain-bad';exp.style.display='block';
        exp.innerHTML=`❌ 答錯，正確是「${esc(q.opts[q.ans])}」 ｜ ${esc(q.exp)}`;
      }
      document.getElementById('m1nx').style.display='block';
    };
    window.m1next=()=>{ qi++; qi>=qs.length ? showResult(1,score,`答對 ${correct}/${qs.length} 題`) : renderQ(); };
  }
}

// ════════════════════════════════════════════
//  MODE 2 填空
// ════════════════════════════════════════════
function initBlanks(){
  document.getElementById('g-title').textContent='✏️ 名句填空';
  let bi=0,score=0;
  renderBlank();

  function renderBlank(){
    document.getElementById('g-sub').textContent=`第 ${bi+1} / ${BLANKS.length} 句`;
    const b=BLANKS[bi];
    let sentHtml=b.text.replace(/\{([^}]+)\}/g,(_,w)=>
      `<span class="blank" id="bl-${w}" data-word="${w}" onclick="blClick(this)">　　　</span>`);
    const pool=[...b.pool].sort(()=>Math.random()-.5);
    document.getElementById('g-body').innerHTML=`
      <div class="panel pop">
        <div class="prog-wrap"><div class="prog-bar" style="width:${bi/BLANKS.length*100}%"></div></div>
        <div class="blank-q-num">第 ${bi+1} / ${BLANKS.length} 句｜點選字詞後，再點空格填入</div>
        <div class="blank-sentence">${sentHtml}</div>
        <div class="word-pool">${pool.map(w=>`<span class="word-chip" id="wc-${w}" data-word="${w}" onclick="wcClick(this)">${w}</span>`).join('')}</div>
        <div>
          <button class="check-btn" onclick="checkBlanks()">確認答案</button>
          <button class="reset-btn" onclick="renderBlank()">重設</button>
        </div>
        <div class="blank-msg" id="bl-msg"></div>
      </div>`;
    window._bd=b; window._selWord=null;
  }

  window.wcClick=el=>{
    if(el.classList.contains('used')) return;
    document.querySelectorAll('.word-chip').forEach(c=>{c.classList.remove('selected')});
    window._selWord=el.dataset.word; el.classList.add('selected');
  };
  window.blClick=el=>{
    if(!window._selWord) return;
    const prev=el.dataset.filled;
    if(prev){const pc=document.getElementById('wc-'+prev);if(pc)pc.classList.remove('used')}
    el.textContent=window._selWord; el.dataset.filled=window._selWord; el.classList.add('filled');
    document.getElementById('wc-'+window._selWord)?.classList.add('used');
    document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('selected'));
    window._selWord=null;
  };
  window.checkBlanks=()=>{
    const b=window._bd; let allFilled=true,allOk=true;
    b.blanks.forEach(w=>{
      const el=document.getElementById('bl-'+w);
      if(!el?.dataset.filled){allFilled=false;}
      else if(el.dataset.filled!==w){allOk=false; el.classList.add('wrong-fill');}
    });
    const msg=document.getElementById('bl-msg');
    if(!allFilled){
      msg.style.cssText='display:block;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:var(--gold);border-radius:10px;padding:.7rem 1rem;font-size:.83rem';
      msg.textContent='還有空格未填，全部填完再確認！'; return;
    }
    if(allOk){
      score+=20; msg.style.cssText='display:block;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#6ee7b7;border-radius:10px;padding:.7rem 1rem;font-size:.83rem';
      msg.textContent='✅ 完全正確！+20 分';
      setTimeout(()=>{ bi++; bi>=BLANKS.length ? showResult(2,score,'') : renderBlank(); },900);
    } else {
      msg.style.cssText='display:block;background:rgba(232,69,69,.1);border:1px solid rgba(232,69,69,.25);color:#fca5a5;border-radius:10px;padding:.7rem 1rem;font-size:.83rem';
      msg.textContent='❌ 有填錯的字詞，紅色格子已清空，請重新填入。';
      b.blanks.forEach(w=>{
        const el=document.getElementById('bl-'+w);
        if(el?.dataset.filled&&el.dataset.filled!==w){
          document.getElementById('wc-'+el.dataset.filled)?.classList.remove('used');
          el.textContent='　　　'; el.dataset.filled=''; el.classList.remove('filled','wrong-fill');
        }
      });
    }
  };
}

// ════════════════════════════════════════════
//  MODE 3 配對
// ════════════════════════════════════════════
function initMatch(){
  document.getElementById('g-title').textContent='🧩 人物配對';
  document.getElementById('g-sub').textContent='';
  const pairs=[...MATCH.pairs].sort(()=>Math.random()-.5);
  const reacs=[...MATCH.pairs].sort(()=>Math.random()-.5);
  const correct={}; MATCH.pairs.forEach(p=>correct[p.person]=p.reaction);
  let sel=null, matched=0;

  document.getElementById('g-body').innerHTML=`
    <div class="panel pop">
      <p class="match-intro">${MATCH.title}</p>
      <div class="match-cols">
        <div class="match-col">
          <h4>人 物</h4>
          ${pairs.map(p=>`<div class="match-item" id="mp-${p.person}" data-type="person" data-val="${p.person}" onclick="mClick(this)">${p.person}</div>`).join('')}
        </div>
        <div class="match-col">
          <h4>笑場反應</h4>
          ${reacs.map(p=>`<div class="match-item" id="mr-${p.reaction}" data-type="reaction" data-val="${p.reaction}" onclick="mClick(this)">${p.reaction}</div>`).join('')}
        </div>
      </div>
      <div class="match-msg" id="m-msg"></div>
    </div>`;

  window.mClick=el=>{
    if(el.classList.contains('matched')) return;
    if(!sel){sel=el;el.classList.add('selected');return}
    if(sel===el){sel=null;el.classList.remove('selected');return}
    if(sel.dataset.type===el.dataset.type){sel.classList.remove('selected');sel=el;el.classList.add('selected');return}
    const person=sel.dataset.type==='person'?sel.dataset.val:el.dataset.val;
    const reaction=sel.dataset.type==='reaction'?sel.dataset.val:el.dataset.val;
    const msg=document.getElementById('m-msg');
    if(correct[person]===reaction){
      [sel,el].forEach(x=>{x.classList.remove('selected');x.classList.add('matched')});
      matched++;
      msg.style.cssText='display:block;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#6ee7b7;border-radius:10px;padding:.65rem 1rem;font-size:.83rem';
      msg.textContent=`✅ 正確！${person} → ${reaction}`;
      if(matched===MATCH.pairs.length) setTimeout(()=>showResult(3,100,'全部配對正確'),600);
    } else {
      [sel,el].forEach(x=>{x.classList.remove('selected');x.classList.add('wrong-m')});
      msg.style.cssText='display:block;background:rgba(232,69,69,.1);border:1px solid rgba(232,69,69,.25);color:#fca5a5;border-radius:10px;padding:.65rem 1rem;font-size:.83rem';
      msg.textContent='❌ 配對錯誤，再想想看！';
      setTimeout(()=>[sel,el].forEach(x=>x.classList.remove('wrong-m')),500);
    }
    sel=null;
  };
}

function initSort(){
  document.getElementById('g-title').textContent='📜 情節排序';
  document.getElementById('g-sub').textContent='';
  let items=[...SORT].sort(()=>Math.random()-.5);
  let dragIdx=null;
  render();

  function render(){
    document.getElementById('g-body').innerHTML=`
      <div class="panel pop">
        <p class="sort-intro">拖曳調整順序，讓事件符合課文發展</p>
        <div class="sort-list" id="sl">
          ${items.map((e,i)=>`
            <div class="sort-item" draggable="true" data-i="${i}"
              ondragstart="sdStart(${i})"
              ondragover="sdOver(event,${i})"
              ondrop="sdDrop(${i})"
              ondragend="sdEnd()">
              <span class="sort-handle">⠿</span>
              <span class="sort-num">${i+1}</span>
              <span>${esc(e)}</span>
            </div>`).join('')}
        </div>
        <div class="sort-btns">
          <button class="sort-check" onclick="sortCheck()">確認順序</button>
          <button class="sort-reset" onclick="initSort()">重新打亂</button>
        </div>
        <div class="sort-msg" id="sm"></div>
      </div>`;
  }

  window.sdStart=i=>{dragIdx=i};
  window.sdOver=(e,i)=>{
    e.preventDefault();
    document.querySelectorAll('.sort-item').forEach(x=>x.classList.remove('drag-over'));
    document.querySelector(`.sort-item[data-i="${i}"]`)?.classList.add('drag-over');
  };
  window.sdDrop=i=>{
    if(dragIdx===null||dragIdx===i) return;
    [items[dragIdx],items[i]]=[items[i],items[dragIdx]]; render();
  };
  window.sdEnd=()=>{
    document.querySelectorAll('.sort-item').forEach(x=>x.classList.remove('drag-over'));
    dragIdx=null;
  };
  window.sortCheck=()=>{
    let ok=0;
    items.forEach((e,i)=>{
      const el=document.querySelector(`.sort-item[data-i="${i}"]`);
      if(e===SORT[i]){ok++;el?.classList.add('correct-pos')}
      else el?.classList.add('wrong-pos');
    });
    const sm=document.getElementById('sm');
    const score=Math.round(ok/SORT.length*100);
    if(ok===SORT.length){
      sm.style.cssText='display:block;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#6ee7b7;border-radius:10px;padding:.8rem 1rem;font-size:.83rem';
      sm.textContent='🎉 完全正確！順序無誤！';
      setTimeout(()=>showResult(4,100,'情節排序完全正確'),700);
    } else {
      sm.style.cssText='display:block;background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:#93c5fd;border-radius:10px;padding:.8rem 1rem;font-size:.83rem;line-height:1.6';
      sm.innerHTML=`答對 ${ok}/${SORT.length} 個位置。綠色正確，紅色需調整。<br>
        <button onclick="initSort()" style="margin-top:.5rem;padding:.4rem .9rem;background:transparent;border:1px solid #60a5fa;color:#60a5fa;border-radius:7px;font-size:.8rem;cursor:pointer">再試一次</button>
        <button onclick="showResult(4,${score},'')" style="margin-top:.5rem;margin-left:.4rem;padding:.4rem .9rem;background:#4a9eff;border:none;color:#fff;border-radius:7px;font-size:.8rem;cursor:pointer">送出此成績</button>`;
    }
  };
}
</script>
</body>
</html>
