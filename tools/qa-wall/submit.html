<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學思達問答收集器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.4rem;
      color: #f97316;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 0.4rem;
      margin-top: 1.1rem;
    }

    select, input[type="number"], textarea {
      width: 100%;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      padding: 0.65rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="number"]:focus, textarea:focus {
      border-color: #f97316;
    }

    textarea {
      resize: none;
      height: 100px;
      line-height: 1.5;
    }

    .char-count {
      font-size: 0.78rem;
      color: #666;
      text-align: right;
      margin-top: 0.3rem;
    }

    .char-count.warn { color: #ef4444; }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) { background: #ea6a0a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
    }

    .success .icon { font-size: 3rem; margin-bottom: 0.75rem; }

    .success h2 {
      font-size: 1.3rem;
      color: #f97316;
      margin-bottom: 0.5rem;
    }

    .success p { color: #aaa; font-size: 0.9rem; }

    .error-msg {
      color: #ef4444;
      font-size: 0.83rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div id="form-area">
    <h1>學思達問答收集器</h1>
    <p class="subtitle">請填寫後送出，老師會即時看到你的回應</p>

    <label for="class-select">班級</label>
    <select id="class-select">
      <option value="">── 請選擇班級 ──</option>
      <optgroup label="高一">
        <option>高一甲</option>
        <option>高一乙</option>
        <option>高一丙</option>
        <option>高一丁</option>
        <option>高一戊</option>
      </optgroup>
      <optgroup label="高二">
        <option>高二甲</option>
        <option>高二乙</option>
        <option>高二丙</option>
        <option>高二丁</option>
        <option>高二戊</option>
      </optgroup>
      <optgroup label="高三">
        <option>高三甲</option>
        <option>高三乙</option>
        <option>高三丙</option>
        <option>高三丁</option>
        <option>高三戊</option>
      </optgroup>
    </select>

    <label for="seat-num">座號</label>
    <input type="number" id="seat-num" placeholder="請輸入座號（數字）" min="1" max="50">

    <label for="response-text">一句話回應</label>
    <textarea id="response-text" placeholder="請輸入你的想法（50 字以內）" maxlength="50"></textarea>
    <div class="char-count" id="char-count">0 / 50</div>

    <div class="error-msg" id="error-msg"></div>

    <button id="submit-btn" onclick="submitResponse()">送出回應</button>
  </div>

  <div class="success" id="success-area">
    <div class="icon">✅</div>
    <h2>已收到，謝謝！</h2>
    <p>你的回應已送到老師的展示頁面。</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, addDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: "AIzaSyBMTe5eLI3GKmLz6beXvfnaBgQaXJsr-xM",
    authDomain: "my-teaching-tools-b8e86.firebaseapp.com",
    projectId: "my-teaching-tools-b8e86",
    storageBucket: "my-teaching-tools-b8e86.firebasestorage.app",
    messagingSenderId: "47224328529",
    appId: "1:47224328529:web:6e6f761ff6b455f9db0370"
  });
  const db = getFirestore(app);

  const textarea = document.getElementById('response-text');
  const charCount = document.getElementById('char-count');

  textarea.addEventListener('input', () => {
    const n = textarea.value.length;
    charCount.textContent = `${n} / 50`;
    charCount.classList.toggle('warn', n >= 45);
  });

  let lastSubmit = 0;

  window.submitResponse = async function () {
    const classSelect = document.getElementById('class-select');
    const seatNum = document.getElementById('seat-num');
    const errorMsg = document.getElementById('error-msg');
    const btn = document.getElementById('submit-btn');

    const className = classSelect.value.trim();
    const seat = seatNum.value.trim();
    const response = textarea.value.trim();

    errorMsg.style.display = 'none';

    if (!className) return showError('請選擇班級');
    if (!seat || isNaN(seat) || +seat < 1 || +seat > 50) return showError('請輸入正確的座號（1–50）');
    if (response.length < 3) return showError('回應太短，請至少輸入 3 個字');

    const now = Date.now();
    if (now - lastSubmit < 10000) return showError('10 秒內不能重複送出，請稍候');

    btn.disabled = true;
    btn.textContent = '送出中…';

    try {
      await addDoc(collection(db, 'class_responses'), {
        student_id: Number(seat),
        class_name: className,
        response: response,
        created_at: serverTimestamp()
      });
      lastSubmit = now;
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success-area').style.display = 'block';
    } catch (e) {
      console.error(e);
      showError('送出失敗，請確認網路連線後重試');
      btn.disabled = false;
      btn.textContent = '送出回應';
    }
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
